<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="theme-color" content="#0a0c12" />
<title>Backcountry — Self-hosted GPX & terrain map</title>

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<!-- MapLibre -->
<link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet" />
<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>

<!-- Chart.js for elevation profile -->
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.6/dist/chart.umd.min.js"></script>

<style>
  :root {
    --bg-deep: #0a0c12;
    --bg-sidebar: #0f1117;
    --bg-card: #181b25;
    --bg-elevated: #1f2330;
    --bg-glass: rgba(15, 17, 23, 0.72);
    --border: #232733;
    --border-strong: #2d3243;
    --text: #e8eaf0;
    --text-dim: #8b92a6;
    --text-muted: #5a6178;
    --accent: #FF6B35;
    --accent-soft: #ff8758;
    --accent-glow: rgba(255, 107, 53, 0.35);
    --cold: #4A9EFF;
    --cold-glow: rgba(74, 158, 255, 0.35);
    --success: #6BCB77;
    --warning: #FFD93D;
    --danger: #FF6B9D;

    --font-sans: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
    --font-mono: 'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace;

    --r-sm: 6px;
    --r-md: 10px;
    --r-lg: 14px;

    --shadow-sm: 0 2px 8px rgba(0,0,0,0.35);
    --shadow-md: 0 8px 24px rgba(0,0,0,0.45);
    --shadow-lg: 0 16px 48px rgba(0,0,0,0.55);

    --sidebar-w: 340px;
    --t-fast: 160ms cubic-bezier(0.4, 0, 0.2, 1);
    --t-med: 280ms cubic-bezier(0.4, 0, 0.2, 1);
    --t-slow: 480ms cubic-bezier(0.4, 0, 0.2, 1);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%; height: 100%;
    background: var(--bg-deep);
    color: var(--text);
    font-family: var(--font-sans);
    font-size: 14px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    overflow: hidden;
    overscroll-behavior: none;
  }

  button, input, select { font-family: inherit; color: inherit; }
  button { cursor: pointer; border: none; background: none; }

  /* === LAYOUT === */
  #app {
    display: grid;
    grid-template-columns: var(--sidebar-w) 1fr;
    width: 100vw; height: 100vh;
    transition: grid-template-columns var(--t-med);
  }
  #app.sidebar-collapsed { grid-template-columns: 0 1fr; }
  #app.sidebar-collapsed #sidebar { transform: translateX(-100%); }

  /* === SIDEBAR === */
  #sidebar {
    background: var(--bg-sidebar);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    transition: transform var(--t-med);
    position: relative;
    z-index: 10;
  }

  /* Topographic line texture overlay on sidebar */
  #sidebar::before {
    content: '';
    position: absolute; inset: 0;
    background-image:
      radial-gradient(ellipse 800px 600px at 50% -20%, rgba(255,107,53,0.06), transparent 50%),
      repeating-linear-gradient(135deg, transparent 0 28px, rgba(255,255,255,0.012) 28px 29px);
    pointer-events: none;
  }

  .sidebar-header {
    padding: 18px 20px 14px;
    border-bottom: 1px solid var(--border);
    position: relative;
    z-index: 1;
  }
  .brand {
    display: flex; align-items: center; gap: 10px;
    font-weight: 700; font-size: 16px; letter-spacing: -0.01em;
  }
  .brand-mark {
    width: 28px; height: 28px;
    background: linear-gradient(135deg, var(--accent) 0%, #ff4d2e 100%);
    border-radius: 7px;
    position: relative;
    box-shadow: 0 4px 12px var(--accent-glow);
    flex-shrink: 0;
  }
  .brand-mark::after {
    content: '';
    position: absolute; inset: 4px;
    background: var(--bg-sidebar);
    clip-path: polygon(0 100%, 30% 60%, 50% 75%, 70% 30%, 100% 100%);
    border-radius: 3px;
  }
  .brand-meta {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text-muted);
    margin-top: 2px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  .sidebar-content {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    padding: 16px 12px 80px;
    position: relative;
    z-index: 1;
  }
  .sidebar-content::-webkit-scrollbar { width: 6px; }
  .sidebar-content::-webkit-scrollbar-track { background: transparent; }
  .sidebar-content::-webkit-scrollbar-thumb {
    background: var(--border-strong);
    border-radius: 3px;
  }

  .panel {
    margin-bottom: 18px;
  }
  .panel-title {
    display: flex; justify-content: space-between; align-items: center;
    padding: 6px 8px 10px;
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    font-weight: 600;
  }
  .panel-title .count {
    background: var(--bg-card);
    border: 1px solid var(--border);
    padding: 2px 7px;
    border-radius: 999px;
    color: var(--text-dim);
    font-size: 10px;
  }

  /* === LOAD GPX BUTTON === */
  .load-gpx {
    width: 100%;
    padding: 12px 14px;
    background: linear-gradient(180deg, var(--accent) 0%, #e85a25 100%);
    color: white;
    border-radius: var(--r-md);
    font-weight: 600;
    font-size: 13px;
    letter-spacing: -0.01em;
    box-shadow: 0 4px 14px var(--accent-glow), inset 0 1px 0 rgba(255,255,255,0.18);
    transition: transform var(--t-fast), box-shadow var(--t-fast);
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .load-gpx:hover {
    transform: translateY(-1px);
    box-shadow: 0 8px 22px var(--accent-glow), inset 0 1px 0 rgba(255,255,255,0.18);
  }
  .load-gpx:active { transform: translateY(0); }

  /* === TRACK ITEM === */
  .track-item {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--r-md);
    padding: 10px 12px;
    margin-bottom: 6px;
    cursor: pointer;
    transition: all var(--t-fast);
    position: relative;
    overflow: hidden;
  }
  .track-item:hover {
    border-color: var(--border-strong);
    background: var(--bg-elevated);
  }
  .track-item.active {
    border-color: var(--accent);
    background: var(--bg-elevated);
    box-shadow: 0 0 0 1px var(--accent), 0 4px 14px rgba(0,0,0,0.4);
  }
  .track-item-color {
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
  }
  .track-item-name {
    font-weight: 600;
    font-size: 13px;
    margin-bottom: 6px;
    padding-left: 8px;
    color: var(--text);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .track-item-stats {
    display: flex;
    gap: 12px;
    padding-left: 8px;
    font-family: var(--font-mono);
    font-size: 10.5px;
    color: var(--text-dim);
  }
  .track-item-stat { display: flex; gap: 3px; align-items: baseline; }
  .track-item-stat .label { color: var(--text-muted); font-size: 9.5px; text-transform: uppercase; letter-spacing: 0.05em; }
  .track-item-actions {
    position: absolute;
    top: 8px; right: 8px;
    display: flex; gap: 4px;
    opacity: 0;
    transition: opacity var(--t-fast);
  }
  .track-item:hover .track-item-actions, .track-item.active .track-item-actions { opacity: 1; }
  .track-act {
    width: 22px; height: 22px;
    border-radius: 5px;
    background: rgba(0,0,0,0.4);
    color: var(--text-dim);
    font-size: 11px;
    display: flex; align-items: center; justify-content: center;
    transition: all var(--t-fast);
  }
  .track-act:hover { background: rgba(0,0,0,0.7); color: var(--text); }
  .track-act.danger:hover { color: var(--danger); }

  .empty-state {
    padding: 24px 16px;
    text-align: center;
    color: var(--text-muted);
    font-size: 12px;
    border: 1px dashed var(--border);
    border-radius: var(--r-md);
  }

  /* === LAYER TOGGLES === */
  .layer-toggle {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 10px;
    border-radius: var(--r-sm);
    cursor: pointer;
    transition: background var(--t-fast);
    user-select: none;
  }
  .layer-toggle:hover { background: var(--bg-card); }
  .layer-swatch {
    width: 14px; height: 14px;
    border-radius: 3px;
    border: 1px solid rgba(255,255,255,0.1);
    flex-shrink: 0;
  }
  .layer-label { flex: 1; font-size: 13px; }
  .layer-label .sub {
    display: block;
    font-family: var(--font-mono);
    font-size: 9.5px;
    color: var(--text-muted);
    letter-spacing: 0.04em;
  }

  /* Toggle switch */
  .switch {
    width: 32px; height: 18px;
    background: var(--border);
    border-radius: 999px;
    position: relative;
    transition: background var(--t-fast);
    flex-shrink: 0;
  }
  .switch::after {
    content: '';
    position: absolute;
    top: 2px; left: 2px;
    width: 14px; height: 14px;
    background: var(--text-dim);
    border-radius: 50%;
    transition: all var(--t-fast);
  }
  .layer-toggle.on .switch { background: var(--accent); }
  .layer-toggle.on .switch::after { left: 16px; background: white; }

  /* === BASEMAP SWITCHER (in sidebar) === */
  .basemap-row {
    display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px;
  }
  .basemap-btn {
    padding: 8px 6px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--r-sm);
    font-size: 11px;
    color: var(--text-dim);
    transition: all var(--t-fast);
    text-align: center;
    font-weight: 500;
  }
  .basemap-btn:hover { border-color: var(--border-strong); color: var(--text); }
  .basemap-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
    font-weight: 600;
  }

  /* === MAP === */
  #map-container {
    position: relative;
    overflow: hidden;
  }
  #map {
    position: absolute; inset: 0;
    background: #050709;
  }

  /* MapLibre control overrides */
  .maplibregl-ctrl-bottom-right, .maplibregl-ctrl-bottom-left { display: none; }
  .maplibregl-popup { z-index: 5; }
  .maplibregl-popup-content {
    background: var(--bg-glass);
    backdrop-filter: blur(16px) saturate(140%);
    -webkit-backdrop-filter: blur(16px) saturate(140%);
    border: 1px solid var(--border-strong);
    border-radius: var(--r-md);
    color: var(--text);
    padding: 12px 14px;
    box-shadow: var(--shadow-md);
    font-family: var(--font-sans);
  }
  .maplibregl-popup-tip { display: none; }
  .maplibregl-popup-close-button {
    color: var(--text-dim);
    font-size: 18px;
    padding: 2px 6px;
    right: 4px; top: 4px;
  }
  .maplibregl-popup-close-button:hover { background: transparent; color: var(--text); }

  /* === FLOATING UI ON MAP === */
  .map-overlay {
    position: absolute;
    z-index: 4;
    pointer-events: none;
  }
  .map-overlay > * { pointer-events: auto; }

  /* Top bar */
  .top-bar {
    top: 16px; left: 16px; right: 16px;
    display: flex; gap: 12px; align-items: flex-start;
  }
  .top-bar > * { pointer-events: auto; }

  /* Sidebar toggle on map */
  .sidebar-toggle {
    width: 40px; height: 40px;
    background: var(--bg-glass);
    backdrop-filter: blur(16px) saturate(140%);
    -webkit-backdrop-filter: blur(16px) saturate(140%);
    border: 1px solid var(--border-strong);
    border-radius: var(--r-md);
    color: var(--text);
    display: flex; align-items: center; justify-content: center;
    box-shadow: var(--shadow-sm);
    flex-shrink: 0;
    transition: all var(--t-fast);
  }
  .sidebar-toggle:hover { border-color: var(--accent); color: var(--accent); }

  /* Search */
  .search-wrap {
    flex: 1;
    max-width: 460px;
    position: relative;
  }
  .search-input {
    width: 100%;
    padding: 10px 14px 10px 38px;
    background: var(--bg-glass);
    backdrop-filter: blur(16px) saturate(140%);
    -webkit-backdrop-filter: blur(16px) saturate(140%);
    border: 1px solid var(--border-strong);
    border-radius: var(--r-md);
    font-size: 13px;
    color: var(--text);
    box-shadow: var(--shadow-sm);
    transition: border-color var(--t-fast);
    outline: none;
  }
  .search-input::placeholder { color: var(--text-muted); }
  .search-input:focus { border-color: var(--accent); }
  .search-icon {
    position: absolute;
    left: 12px; top: 50%; transform: translateY(-50%);
    color: var(--text-dim);
    pointer-events: none;
  }
  .search-results {
    position: absolute;
    top: calc(100% + 6px); left: 0; right: 0;
    background: var(--bg-glass);
    backdrop-filter: blur(16px) saturate(140%);
    -webkit-backdrop-filter: blur(16px) saturate(140%);
    border: 1px solid var(--border-strong);
    border-radius: var(--r-md);
    box-shadow: var(--shadow-md);
    max-height: 280px;
    overflow-y: auto;
    display: none;
  }
  .search-results.show { display: block; }
  .search-result {
    padding: 10px 14px;
    cursor: pointer;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
    transition: background var(--t-fast);
  }
  .search-result:last-child { border-bottom: none; }
  .search-result:hover { background: rgba(255,255,255,0.04); }
  .search-result .sub {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 2px;
  }

  /* Map controls (right side) */
  .map-controls {
    position: absolute;
    top: 72px; right: 16px;
    display: flex; flex-direction: column; gap: 6px;
    z-index: 4;
  }
  .map-ctrl {
    width: 40px; height: 40px;
    background: var(--bg-glass);
    backdrop-filter: blur(16px) saturate(140%);
    -webkit-backdrop-filter: blur(16px) saturate(140%);
    border: 1px solid var(--border-strong);
    border-radius: var(--r-md);
    color: var(--text);
    display: flex; align-items: center; justify-content: center;
    box-shadow: var(--shadow-sm);
    transition: all var(--t-fast);
    pointer-events: auto;
  }
  .map-ctrl:hover { border-color: var(--accent); color: var(--accent); }
  .map-ctrl.active {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }
  .map-ctrl-group {
    display: flex; flex-direction: column;
    background: var(--bg-glass);
    backdrop-filter: blur(16px) saturate(140%);
    -webkit-backdrop-filter: blur(16px) saturate(140%);
    border: 1px solid var(--border-strong);
    border-radius: var(--r-md);
    box-shadow: var(--shadow-sm);
    overflow: hidden;
  }
  .map-ctrl-group .map-ctrl {
    background: transparent;
    backdrop-filter: none;
    border: none;
    border-radius: 0;
    border-bottom: 1px solid var(--border);
    box-shadow: none;
    width: 40px; height: 40px;
  }
  .map-ctrl-group .map-ctrl:last-child { border-bottom: none; }
  .map-ctrl-group .map-ctrl:hover {
    background: rgba(255,255,255,0.05);
    color: var(--accent);
  }
  .map-ctrl-group .map-ctrl.active {
    background: var(--accent);
    color: white;
  }

  /* === WEATHER PANEL === */
  .weather-panel {
    position: absolute;
    top: 16px; right: 70px;
    width: 320px;
    background: var(--bg-glass);
    backdrop-filter: blur(20px) saturate(140%);
    -webkit-backdrop-filter: blur(20px) saturate(140%);
    border: 1px solid var(--border-strong);
    border-radius: var(--r-lg);
    box-shadow: var(--shadow-lg);
    overflow: hidden;
    z-index: 5;
    transform: translateX(20px);
    opacity: 0;
    pointer-events: none;
    transition: opacity var(--t-med), transform var(--t-med);
  }
  .weather-panel.show {
    opacity: 1; transform: translateX(0);
    pointer-events: auto;
  }
  .weather-header {
    padding: 14px 16px 10px;
    display: flex; justify-content: space-between; align-items: flex-start;
    border-bottom: 1px solid var(--border);
  }
  .weather-loc {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.02em;
  }
  .weather-title {
    font-weight: 600;
    font-size: 13px;
    margin-bottom: 2px;
  }
  .weather-close {
    color: var(--text-dim);
    width: 24px; height: 24px;
    border-radius: 5px;
    display: flex; align-items: center; justify-content: center;
    transition: all var(--t-fast);
    margin: -4px -4px 0 0;
  }
  .weather-close:hover { background: rgba(255,255,255,0.06); color: var(--text); }

  .weather-current {
    padding: 18px 16px;
    display: flex;
    align-items: center;
    gap: 14px;
    background: linear-gradient(180deg, rgba(74,158,255,0.06) 0%, transparent 100%);
  }
  .weather-icon-big { font-size: 56px; line-height: 1; flex-shrink: 0; }
  .weather-temp-big {
    font-size: 38px;
    font-weight: 600;
    letter-spacing: -0.02em;
    line-height: 1;
    font-family: var(--font-mono);
  }
  .weather-cond {
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 4px;
  }
  .weather-meta {
    display: flex;
    gap: 12px;
    padding: 10px 16px;
    border-top: 1px solid var(--border);
    font-family: var(--font-mono);
    font-size: 10.5px;
    color: var(--text-dim);
  }
  .weather-meta .item {
    display: flex; flex-direction: column; gap: 1px;
  }
  .weather-meta .lbl { color: var(--text-muted); font-size: 9px; text-transform: uppercase; letter-spacing: 0.06em; }
  .weather-meta .val { color: var(--text); font-weight: 500; font-size: 11px; }

  .weather-forecast {
    padding: 8px 8px 12px;
    border-top: 1px solid var(--border);
  }
  .forecast-row {
    display: grid;
    grid-template-columns: 38px 28px 1fr 60px;
    align-items: center;
    gap: 8px;
    padding: 6px 8px;
    border-radius: var(--r-sm);
  }
  .forecast-row:hover { background: rgba(255,255,255,0.03); }
  .forecast-day { font-size: 12px; color: var(--text-dim); font-family: var(--font-mono); }
  .forecast-icon { font-size: 18px; text-align: center; }
  .forecast-bar {
    height: 5px; background: var(--bg-card);
    border-radius: 999px;
    position: relative;
    overflow: hidden;
  }
  .forecast-bar-fill {
    position: absolute;
    height: 100%;
    background: linear-gradient(90deg, var(--cold), var(--accent));
    border-radius: 999px;
  }
  .forecast-temps {
    text-align: right;
    font-family: var(--font-mono);
    font-size: 11px;
  }
  .forecast-hi { color: var(--text); font-weight: 600; }
  .forecast-lo { color: var(--text-muted); margin-left: 4px; }
  .forecast-precip {
    font-family: var(--font-mono);
    font-size: 9px;
    color: var(--cold);
    margin-left: 4px;
  }

  .avalanche-link {
    display: flex; align-items: center; gap: 8px;
    padding: 10px 16px;
    background: linear-gradient(90deg, rgba(255,107,53,0.08), transparent);
    border-top: 1px solid var(--border);
    color: var(--accent);
    font-size: 12px;
    font-weight: 500;
    text-decoration: none;
    transition: background var(--t-fast);
  }
  .avalanche-link:hover { background: linear-gradient(90deg, rgba(255,107,53,0.15), rgba(255,107,53,0.04)); }
  .avalanche-link .ext { margin-left: auto; opacity: 0.6; }

  .weather-loading {
    padding: 40px 16px;
    text-align: center;
    color: var(--text-dim);
  }
  .spinner {
    width: 28px; height: 28px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    margin: 0 auto 10px;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* === ELEVATION PROFILE === */
  .elevation-panel {
    position: absolute;
    bottom: 32px; left: 16px; right: 16px;
    height: 200px;
    background: var(--bg-glass);
    backdrop-filter: blur(20px) saturate(140%);
    -webkit-backdrop-filter: blur(20px) saturate(140%);
    border: 1px solid var(--border-strong);
    border-radius: var(--r-lg);
    box-shadow: var(--shadow-lg);
    z-index: 4;
    transform: translateY(220px);
    transition: transform var(--t-med);
    overflow: hidden;
  }
  .elevation-panel.show { transform: translateY(0); }
  .elevation-header {
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center;
  }
  .elevation-title {
    font-size: 12px;
    font-weight: 600;
    display: flex; align-items: center; gap: 8px;
  }
  .elevation-title .swatch {
    width: 10px; height: 10px; border-radius: 2px;
  }
  .elevation-stats {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-dim);
    display: flex; gap: 14px;
  }
  .elevation-stats .stat .v { color: var(--text); font-weight: 600; margin-left: 3px; }
  .elevation-canvas-wrap {
    height: calc(100% - 38px);
    padding: 4px 8px 6px;
    position: relative;
  }
  .elevation-readout {
    position: absolute;
    top: 8px; left: 14px;
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text);
    background: rgba(0,0,0,0.6);
    padding: 4px 8px;
    border-radius: 5px;
    pointer-events: none;
    opacity: 0;
    transition: opacity var(--t-fast);
  }
  .elevation-readout.show { opacity: 1; }

  /* === STATUS BAR === */
  .status-bar {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 28px;
    background: var(--bg-glass);
    backdrop-filter: blur(16px) saturate(140%);
    -webkit-backdrop-filter: blur(16px) saturate(140%);
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 16px;
    font-family: var(--font-mono);
    font-size: 10.5px;
    color: var(--text-dim);
    z-index: 3;
    gap: 18px;
  }
  .status-item { display: flex; gap: 6px; }
  .status-item .lbl { color: var(--text-muted); }
  .status-item .v { color: var(--text); }
  .status-spacer { flex: 1; }

  /* === SCALE BAR (custom) === */
  .scale-bar {
    position: absolute;
    bottom: 38px; left: 16px;
    background: var(--bg-glass);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid var(--border);
    border-radius: 5px;
    padding: 4px 8px;
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text-dim);
    z-index: 3;
    user-select: none;
  }
  .scale-bar-line {
    height: 4px;
    background: var(--text);
    margin-top: 2px;
    border-left: 1px solid var(--text);
    border-right: 1px solid var(--text);
    border-bottom: 1px solid var(--text);
  }

  /* === NORTH ARROW === */
  .north-arrow {
    position: absolute;
    bottom: 38px; right: 16px;
    width: 36px; height: 36px;
    background: var(--bg-glass);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid var(--border);
    border-radius: 50%;
    z-index: 3;
    display: flex; align-items: center; justify-content: center;
    transition: transform var(--t-fast);
  }
  .north-arrow svg { color: var(--text); }
  .north-arrow .n-marker {
    fill: var(--accent);
  }

  /* === LEGEND === */
  .legend {
    position: absolute;
    bottom: 38px; left: 110px;
    background: var(--bg-glass);
    backdrop-filter: blur(16px) saturate(140%);
    -webkit-backdrop-filter: blur(16px) saturate(140%);
    border: 1px solid var(--border-strong);
    border-radius: var(--r-md);
    padding: 8px 10px;
    font-size: 11px;
    color: var(--text);
    z-index: 3;
    display: none;
  }
  .legend.show { display: block; }
  .legend-title {
    font-family: var(--font-mono);
    font-size: 9px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 6px;
  }
  .legend-item {
    display: flex; align-items: center; gap: 6px;
    margin-bottom: 3px;
  }
  .legend-item:last-child { margin-bottom: 0; }
  .legend-swatch {
    width: 14px; height: 10px; border-radius: 2px;
    border: 1px solid rgba(255,255,255,0.1);
  }
  .legend-swatch.slope-swatch {
    width: 28px;
    background: linear-gradient(to right, #888 0%, #d6d690 25%, #e8a040 50%, #c45032 75%, #6e2418 100%);
  }
  .legend-sub {
    font-family: var(--font-mono);
    color: var(--text-muted);
    font-size: 9.5px;
    margin-left: 4px;
  }

  /* === DRAG OVERLAY === */
  .drop-overlay {
    position: absolute;
    inset: 0;
    background: rgba(255,107,53,0.08);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    border: 3px dashed var(--accent);
    z-index: 100;
    display: none;
    align-items: center; justify-content: center;
    pointer-events: none;
  }
  .drop-overlay.show { display: flex; }
  .drop-message {
    background: var(--bg-glass);
    border: 1px solid var(--border-strong);
    border-radius: var(--r-lg);
    padding: 24px 32px;
    color: var(--accent);
    font-size: 18px;
    font-weight: 600;
    box-shadow: var(--shadow-lg);
  }

  /* === TOAST === */
  .toast-stack {
    position: absolute;
    top: 70px; left: 50%;
    transform: translateX(-50%);
    z-index: 50;
    display: flex; flex-direction: column; gap: 8px;
    pointer-events: none;
  }
  .toast {
    background: var(--bg-glass);
    backdrop-filter: blur(16px) saturate(140%);
    -webkit-backdrop-filter: blur(16px) saturate(140%);
    border: 1px solid var(--border-strong);
    border-radius: var(--r-md);
    padding: 10px 14px;
    font-size: 13px;
    box-shadow: var(--shadow-md);
    animation: toast-in var(--t-med);
    max-width: 380px;
  }
  .toast.error { border-color: var(--danger); color: var(--danger); }
  .toast.success { border-color: var(--success); color: var(--success); }
  @keyframes toast-in {
    from { opacity: 0; transform: translateY(-8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* === KBD === */
  kbd {
    font-family: var(--font-mono);
    font-size: 10px;
    background: var(--bg-card);
    border: 1px solid var(--border-strong);
    padding: 1px 5px;
    border-radius: 4px;
    color: var(--text-dim);
  }

  /* === MAP POPUP STYLES === */
  .track-popup-name { font-weight: 600; font-size: 13px; margin-bottom: 6px; }
  .track-popup-stats {
    font-family: var(--font-mono);
    font-size: 10.5px;
    color: var(--text-dim);
    display: grid; grid-template-columns: auto auto; gap: 4px 12px;
  }
  .track-popup-stats .lbl { color: var(--text-muted); }

  /* === WAYPOINT POPUP === */
  .wpt-popup .wpt-name {
    font-weight: 600; font-size: 13px;
    color: var(--text); display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
    margin-bottom: 4px;
  }
  .wpt-popup .wpt-sym {
    font-family: var(--font-mono); font-size: 10.5px;
    color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.04em;
    margin-bottom: 4px;
  }
  .wpt-popup .wpt-desc {
    font-size: 11.5px; color: var(--text-dim); line-height: 1.45;
    margin: 4px 0 4px;
    white-space: pre-wrap;
  }
  .wpt-popup .wpt-meta {
    font-family: var(--font-mono); font-size: 10.5px;
    color: var(--text-dim); margin-top: 2px;
  }
  .wpt-popup .wpt-coords {
    font-family: var(--font-mono); font-size: 10px;
    color: var(--text-muted); margin-top: 4px;
  }
  .wpt-kind {
    font-size: 9.5px; padding: 1px 6px; border-radius: 8px;
    text-transform: uppercase; letter-spacing: 0.05em; font-weight: 600;
    background: rgba(255,255,255,0.08); color: var(--text-dim);
  }
  .wpt-kind.kind-camp { background: rgba(255,107,53,0.2); color: #FF6B35; }
  .wpt-kind.kind-peak { background: rgba(74,158,255,0.2); color: #4A9EFF; }
  .wpt-kind.kind-water { background: rgba(61,201,245,0.2); color: #3DC9F5; }
  .wpt-kind.kind-trailhead { background: rgba(255,215,0,0.18); color: #FFD700; }
  .wpt-kind.kind-view { background: rgba(167,139,250,0.2); color: #A78BFA; }
  .wpt-kind.kind-food { background: rgba(245,166,35,0.2); color: #F5A623; }
  .wpt-kind.kind-hazard { background: rgba(255,59,48,0.2); color: #FF3B30; }

  /* === PINNED LIBRARY TRACK === */
  .track-item.pinned { border-left: 2px solid var(--accent); }
  .track-pin {
    font-size: 10px; margin-right: 5px; opacity: 0.7;
    filter: hue-rotate(0deg);
  }

  /* === DROP-PIN TOOL === */
  .map-ctrl.active {
    background: var(--accent);
    color: #1a1d27;
    border-color: var(--accent);
  }
  body.pin-mode .maplibregl-canvas { cursor: crosshair !important; }
  body.pin-mode::after {
    content: 'Click on the map to drop a pin · Esc to cancel';
    position: fixed;
    bottom: 18px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--accent);
    color: #1a1d27;
    font-family: var(--font-mono);
    font-size: 11.5px;
    font-weight: 600;
    padding: 8px 14px;
    border-radius: 16px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.4);
    pointer-events: none;
    z-index: 50;
    letter-spacing: 0.02em;
  }
  .pin-popup-name {
    font-weight: 600; font-size: 13px; color: #FFD93D; margin-bottom: 4px;
  }
  .pin-popup-coords {
    font-family: var(--font-mono); font-size: 10.5px; color: var(--text-dim);
  }
  .pin-popup-meta {
    font-family: var(--font-mono); font-size: 9.5px; color: var(--text-muted);
    margin-top: 2px;
  }
  .pin-popup-delete {
    margin-top: 8px;
    background: rgba(255,59,48,0.15);
    color: #FF3B30;
    border: 1px solid rgba(255,59,48,0.3);
    border-radius: 4px;
    padding: 4px 10px;
    font-size: 11px;
    cursor: pointer;
    font-family: var(--font-mono);
    letter-spacing: 0.04em;
  }
  .pin-popup-delete:hover {
    background: rgba(255,59,48,0.25);
    border-color: rgba(255,59,48,0.5);
  }

  /* === HOVER MARKER === */
  .hover-marker {
    width: 14px; height: 14px;
    background: var(--accent);
    border: 2px solid white;
    border-radius: 50%;
    box-shadow: 0 0 12px var(--accent-glow), 0 2px 6px rgba(0,0,0,0.5);
    pointer-events: none;
  }
  .weather-marker {
    width: 18px; height: 18px;
    background: var(--cold);
    border: 2px solid white;
    border-radius: 50%;
    box-shadow: 0 0 16px var(--cold-glow), 0 2px 8px rgba(0,0,0,0.5);
    cursor: pointer;
  }

  /* === MOBILE === */
  @media (max-width: 720px) {
    :root { --sidebar-w: 100%; }
    #app {
      grid-template-columns: 1fr;
      grid-template-rows: 1fr;
    }
    #sidebar {
      position: fixed;
      bottom: 0;
      left: 0; right: 0;
      width: 100%;
      max-height: 70vh;
      border-right: none;
      border-top: 1px solid var(--border);
      border-top-left-radius: 18px;
      border-top-right-radius: 18px;
      transform: translateY(calc(100% - 56px));
      transition: transform var(--t-med);
      z-index: 20;
    }
    #sidebar.open { transform: translateY(0); }
    .sidebar-header {
      cursor: pointer;
      position: relative;
    }
    .sidebar-header::before {
      content: '';
      position: absolute;
      top: 6px; left: 50%;
      transform: translateX(-50%);
      width: 36px; height: 4px;
      background: var(--border-strong);
      border-radius: 2px;
    }
    .sidebar-toggle { display: none; }
    .weather-panel {
      width: calc(100vw - 32px);
      right: 16px;
      top: 70px;
    }
    .map-controls { top: 122px; }
    .top-bar { right: 16px; }
    .elevation-panel { bottom: 60px; height: 160px; }
    .legend { left: 16px; bottom: 70px; }
    .scale-bar { bottom: 64px; }
    .north-arrow { display: none; }
  }

  /* Hide elements when sidebar is collapsed */
  #app.sidebar-collapsed #sidebar { pointer-events: none; }
</style>
</head>
<body>

<div id="app">
  <!-- SIDEBAR -->
  <aside id="sidebar">
    <div class="sidebar-header" id="sidebar-header">
      <div class="brand">
        <div class="brand-mark"></div>
        <div>
          <div>BACKCOUNTRY</div>
          <div class="brand-meta">v1.0 · self-hosted</div>
        </div>
      </div>
    </div>
    <div class="sidebar-content">
      <div class="panel">
        <button class="load-gpx" id="btn-load-gpx">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 5v14M5 12h14"/>
          </svg>
          Load GPX File
        </button>
        <input type="file" id="file-input" accept=".gpx" multiple style="display:none">
      </div>

      <div class="panel">
        <div class="panel-title">Tracks <span class="count" id="tracks-count">0</span></div>
        <div id="tracks-list">
          <div class="empty-state" id="tracks-empty">
            Drop GPX files here<br>or click <strong>Load GPX File</strong>
          </div>
        </div>
      </div>

      <div class="panel">
        <div class="panel-title">Public Lands</div>
        <div id="layers-list"></div>
      </div>

      <div class="panel">
        <div class="panel-title">Terrain</div>
        <div id="terrain-list"></div>
      </div>

      <div class="panel">
        <div class="panel-title">Basemap</div>
        <div class="basemap-row" id="basemap-row"></div>
      </div>

      <div class="panel">
        <div class="panel-title">Shortcuts</div>
        <div style="font-size:11px;color:var(--text-dim);line-height:1.9;padding:0 8px">
          <div><kbd>3</kbd> toggle 3D terrain</div>
          <div><kbd>F</kbd> fullscreen</div>
          <div><kbd>/</kbd> focus search</div>
          <div><kbd>Esc</kbd> close panels</div>
          <div><kbd>right-click</kbd> weather here</div>
        </div>
      </div>
    </div>
  </aside>

  <!-- MAP -->
  <main id="map-container">
    <div id="map"></div>

    <!-- Top bar -->
    <div class="map-overlay top-bar">
      <button class="sidebar-toggle" id="sidebar-toggle" title="Toggle sidebar (Ctrl+B)">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="3" y1="6" x2="21" y2="6"/>
          <line x1="3" y1="12" x2="21" y2="12"/>
          <line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>
      <div class="search-wrap">
        <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/>
          <line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input type="text" class="search-input" id="search-input" placeholder="Search a place, peak, or trailhead…" autocomplete="off" />
        <div class="search-results" id="search-results"></div>
      </div>
    </div>

    <!-- Map controls -->
    <div class="map-controls">
      <div class="map-ctrl-group">
        <button class="map-ctrl" id="btn-zoom-in" title="Zoom in">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </button>
        <button class="map-ctrl" id="btn-zoom-out" title="Zoom out">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </button>
      </div>
      <button class="map-ctrl" id="btn-3d" title="Toggle 3D terrain (3)">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 20l5-9 4 6 3-4 6 7"/>
          <path d="M3 20h18"/>
        </svg>
      </button>
      <button class="map-ctrl" id="btn-locate" title="Locate me">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M12 2v3M12 19v3M2 12h3M19 12h3"/>
        </svg>
      </button>
      <button class="map-ctrl" id="btn-fullscreen" title="Fullscreen (F)">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 7V3h4M21 7V3h-4M3 17v4h4M21 17v4h-4"/>
        </svg>
      </button>
      <button class="map-ctrl" id="btn-fit" title="Fit all tracks">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 9V3h6M21 9V3h-6M3 15v6h6M21 15v6h-6"/>
        </svg>
      </button>
      <button class="map-ctrl" id="btn-pin" title="Drop a pin (P)">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 22s-7-7.58-7-13a7 7 0 0 1 14 0c0 5.42-7 13-7 13z"/>
          <circle cx="12" cy="9" r="2.5"/>
        </svg>
      </button>
    </div>

    <!-- Weather panel -->
    <div class="weather-panel" id="weather-panel">
      <div id="weather-content"></div>
    </div>

    <!-- Elevation profile -->
    <div class="elevation-panel" id="elevation-panel">
      <div class="elevation-header">
        <div class="elevation-title">
          <span class="swatch" id="elev-swatch"></span>
          <span id="elev-name"></span>
        </div>
        <div class="elevation-stats" id="elev-stats"></div>
      </div>
      <div class="elevation-canvas-wrap">
        <div class="elevation-readout" id="elev-readout"></div>
        <canvas id="elev-canvas"></canvas>
      </div>
    </div>

    <!-- Status bar -->
    <div class="status-bar">
      <div class="status-item">
        <span class="lbl">LAT</span>
        <span class="v" id="stat-lat">—</span>
      </div>
      <div class="status-item">
        <span class="lbl">LNG</span>
        <span class="v" id="stat-lng">—</span>
      </div>
      <div class="status-item">
        <span class="lbl">ELEV</span>
        <span class="v" id="stat-ele">—</span>
      </div>
      <div class="status-spacer"></div>
      <div class="status-item">
        <span class="lbl">ZOOM</span>
        <span class="v" id="stat-zoom">—</span>
      </div>
    </div>

    <!-- Scale bar -->
    <div class="scale-bar" id="scale-bar">
      <div id="scale-text">— mi</div>
      <div class="scale-bar-line" id="scale-line" style="width:80px"></div>
    </div>

    <!-- North arrow -->
    <div class="north-arrow" id="north-arrow">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <polygon class="n-marker" points="12,3 9,13 12,11 15,13" fill="currentColor"/>
        <polygon points="12,21 9,11 12,13 15,11" fill="none"/>
        <text x="12" y="7.5" text-anchor="middle" font-size="6" font-family="DM Sans" font-weight="700" fill="white">N</text>
      </svg>
    </div>

    <!-- Legend -->
    <div class="legend" id="legend">
      <div class="legend-title">Public Lands</div>
      <div id="legend-items"></div>
    </div>

    <!-- Drag overlay -->
    <div class="drop-overlay" id="drop-overlay">
      <div class="drop-message">
        Drop GPX file to add track
      </div>
    </div>

    <!-- Toasts -->
    <div class="toast-stack" id="toast-stack"></div>
  </main>
</div>

<script type="module">
import { gpx } from 'https://esm.sh/@tmcw/togeojson@5';

// ============================================================
// CONFIG
// ============================================================
const CFG = {
  // Track palette — bright, distinguishable on satellite & topo
  trackColors: [
    '#FF6B35', '#4A9EFF', '#FFD93D', '#6BCB77',
    '#FF6B9D', '#A66DD4', '#FF9F5A', '#56CCF2',
    '#F2C94C', '#27AE60'
  ],

  // Public lands ArcGIS REST endpoints — using export images, no API key
  // These are public services from federal agencies
  layers: {
    // Slope angle: USGS 3DEP ImageServer with the "Slope Map" rendering rule.
    // Renders flat = gray, shallow = yellow, moderate = orange, steep = red-brown.
    // For backcountry skiing, the avalanche-relevant zone is roughly 30-45° (deep
    // orange to red-brown). Server-side rendering — no client-side compute needed.
    slope: {
      kind: 'arcgis-image',
      label: 'Slope Angle',
      sub: 'USGS 3DEP slope map',
      color: '#FF6B35',
      url: 'https://elevation.nationalmap.gov/arcgis/rest/services/3DEPElevation/ImageServer',
      renderingRule: { rasterFunction: 'Slope Map' },
      opacity: 0.55,
      attribution: 'USGS 3DEP',
    },
    // Trails: Waymarked Trails (OpenStreetMap-based hiking routes), free public XYZ.
    trails: {
      kind: 'xyz',
      label: 'Hiking Trails',
      sub: 'OSM Waymarked',
      color: '#dd5050',
      url: 'https://tile.waymarkedtrails.org/hiking/{z}/{x}/{y}.png',
      opacity: 0.85,
      maxzoom: 18,
      attribution: '<a href="https://hiking.waymarkedtrails.org/">Waymarked Trails</a> · <a href="https://www.openstreetmap.org/copyright">© OSM</a>',
    },

    // Forests / BLM / Parks all come from USGS PAD-US (Federal Fee Managers, authoritative)

// ============================================================
// DOM
// ============================================================
const $ = (s) => document.querySelector(s);
const $$ = (s) => document.querySelectorAll(s);

// ============================================================
// UTILS
// ============================================================
const fmt = {
  dist(meters) { return (meters * 0.000621371).toFixed(1); },        // mi
  ele(meters)  { return Math.round(meters * 3.28084).toLocaleString(); }, // ft
  temp(c)      { return Math.round(c * 9/5 + 32); },                 // °F
  wind(kmh)    { return Math.round(kmh * 0.621371); },               // mph
  snow(cm)     { return (cm * 0.393701).toFixed(1); },               // inches
  ll(n, d=4)   { return n.toFixed(d); },
};

function uid() { return Math.random().toString(36).slice(2, 10); }

function haversine(a, b) {
  const R = 6371000; // m
  const toRad = (d) => d * Math.PI / 180;
  const dLat = toRad(b[1] - a[1]);
  const dLon = toRad(b[0] - a[0]);
  const lat1 = toRad(a[1]);
  const lat2 = toRad(b[1]);
  const x = Math.sin(dLat/2)**2 + Math.cos(lat1) * Math.cos(lat2) * Math.sin(dLon/2)**2;
  return 2 * R * Math.atan2(Math.sqrt(x), Math.sqrt(1-x));
}

// Moving average smoothing — reduces GPS noise in elevation
function smoothArray(arr, window = 5) {
  const out = new Array(arr.length);
  const half = Math.floor(window / 2);
  for (let i = 0; i < arr.length; i++) {
    let sum = 0, n = 0;
    for (let j = Math.max(0, i - half); j <= Math.min(arr.length - 1, i + half); j++) {
      if (typeof arr[j] === 'number' && !isNaN(arr[j])) { sum += arr[j]; n++; }
    }
    out[i] = n ? sum / n : arr[i];
  }
  return out;
}

// Compute track stats with smoothed elevation and noise threshold
function calcStats(coords) {
  if (!coords || coords.length < 2) {
    return { distance: 0, gain: 0, loss: 0, maxEle: 0, minEle: 0, cumDist: [], smoothEle: [] };
  }
  const eles = coords.map(c => (c[2] != null ? c[2] : 0));
  const smoothEle = smoothArray(eles, 7);

  let distance = 0;
  let gain = 0, loss = 0;
  let maxEle = -Infinity, minEle = Infinity;
  const cumDist = [0];
  const NOISE = 1.0; // metres — reject tiny changes that are GPS noise

  for (let i = 1; i < coords.length; i++) {
    distance += haversine(coords[i - 1], coords[i]);
    cumDist.push(distance);
    const dEle = smoothEle[i] - smoothEle[i - 1];
    if (dEle > NOISE) gain += dEle;
    else if (dEle < -NOISE) loss += -dEle;
    if (smoothEle[i] > maxEle) maxEle = smoothEle[i];
    if (smoothEle[i] < minEle) minEle = smoothEle[i];
  }
  return { distance, gain, loss, maxEle, minEle, cumDist, smoothEle };
}

function debounce(fn, ms) {
  let t;
  return (...args) => {
    clearTimeout(t);
    t = setTimeout(() => fn(...args), ms);
  };
}

function nextTrackColor() {
  const c = CFG.trackColors[S.trackColorIdx % CFG.trackColors.length];
  S.trackColorIdx++;
  return c;
}
